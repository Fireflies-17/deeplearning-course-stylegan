name: stylegan2-ada-course-blackwell
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip>=24.3
  # torch 2.8.0+cu128 wheels are built against NumPy 2.x; NumPy 1.x breaks
  # torch.from_numpy. Upper bound <2.3 keeps scipy 1.14.1 happy.
  - numpy>=2.0,<2.3
  - pillow=11.3.0
  - scipy=1.14.1
  - pip:
      - --extra-index-url=https://download.pytorch.org/whl/cu128
      - torch==2.8.0+cu128
      - torchvision==0.23.0+cu128
      - click>=8.4.0,<9
      - imageio-ffmpeg==0.6.0
      - lmdb==1.6.2
      - ninja==1.11.1.4
      - opencv-python-headless==4.11.0.86
      - pyspng==0.1.4
      - requests==2.32.5
      - rich>=13.8.0,<14
      - setuptools>=70
      - tqdm==4.67.1
      - wheel>=0.43
